<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Başlığı</title>
</head>
<body>
    <script>
function dis() {
  let gizli = 0; // Bu değişken closure'da yaşayacak

  function ic() {
    gizli++;
    console.log(gizli);
  }

  return ic; // İç fonksiyonu dışarıya sızdır
}

const sayac = dis(); // dis() çalıştı ve bitti
// Ama gizli hâlâ bellekte — sayac onu tutuyor

sayac(); // 1
sayac(); // 2
sayac(); // 3

    </script>
</body>
</html>
